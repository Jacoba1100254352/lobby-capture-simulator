<svg xmlns="http://www.w3.org/2000/svg" width="1800px" height="1100px" viewBox="0 0 1800 1100" role="img">
<title>Interaction tradeoff view</title>
<desc>Scatter plot comparing hidden influence against net transparency gain after reforms bind.</desc>
<style>
text { font-family: Helvetica, Arial, sans-serif; font-size: 34px; fill: #111; }
.title { font-size: 46px; font-weight: 700; }
.subtitle { font-size: 30px; fill: #444; }
.small, .tick, .label { font-size: 28px; }
.axis { stroke: #111; stroke-width: 5; fill: none; }
.grid { stroke: #d8d8d8; stroke-width: 3; fill: none; }
.segment, .point, .legend-swatch { stroke: #111; stroke-width: 2; }
.label-box { fill: #fff; stroke: #111; stroke-width: 2; }
.leader { stroke: #333; stroke-width: 2; fill: none; stroke-dasharray: 8 8; }
.series-primary { stroke: #111; stroke-width: 8; fill: none; }
.series-secondary { stroke: #777; stroke-width: 8; fill: none; stroke-dasharray: 24 18; }
</style>
<rect width="100%" height="100%" fill="#fff"/>
<text x="70" y="72" text-anchor="start" class="title">Interaction tradeoff view</text>
<text x="70" y="122" text-anchor="start" class="subtitle">Hidden influence versus net transparency gain</text>
<line x1="260" y1="170" x2="260" y2="890" class="grid"/>
<text x="260" y="938" text-anchor="middle" class="tick">0</text>
<line x1="567.5" y1="170" x2="567.5" y2="890" class="grid"/>
<text x="567.5" y="938" text-anchor="middle" class="tick">0.1</text>
<line x1="875" y1="170" x2="875" y2="890" class="grid"/>
<text x="875" y="938" text-anchor="middle" class="tick">0.2</text>
<line x1="1182.5" y1="170" x2="1182.5" y2="890" class="grid"/>
<text x="1182.5" y="938" text-anchor="middle" class="tick">0.3</text>
<line x1="1490" y1="170" x2="1490" y2="890" class="grid"/>
<text x="1490" y="938" text-anchor="middle" class="tick">0.4</text>
<line x1="260" y1="890" x2="1490" y2="890" class="grid"/>
<text x="220" y="900" text-anchor="end" class="tick">-0.1</text>
<line x1="260" y1="759.1" x2="1490" y2="759.1" class="grid"/>
<text x="220" y="769.1" text-anchor="end" class="tick">0.0</text>
<line x1="260" y1="628.2" x2="1490" y2="628.2" class="grid"/>
<text x="220" y="638.2" text-anchor="end" class="tick">0.1</text>
<line x1="260" y1="497.3" x2="1490" y2="497.3" class="grid"/>
<text x="220" y="507.3" text-anchor="end" class="tick">0.2</text>
<line x1="260" y1="366.4" x2="1490" y2="366.4" class="grid"/>
<text x="220" y="376.4" text-anchor="end" class="tick">0.3</text>
<line x1="260" y1="235.5" x2="1490" y2="235.5" class="grid"/>
<text x="220" y="245.5" text-anchor="end" class="tick">0.4</text>
<line x1="260" y1="890" x2="1490" y2="890" class="axis"/>
<line x1="260" y1="170" x2="260" y2="890" class="axis"/>
<text x="875" y="994" text-anchor="middle">Hidden influence</text>
<text x="80" y="530" text-anchor="middle" transform="rotate(-90 80 530)">Net transparency gain</text>
<rect x="738.5" y="852.1" width="24" height="24" fill="#111111" class="point"/>
<rect x="601.9" y="211.4" width="24" height="24" fill="#111111" class="point"/>
<rect x="1432.2" y="599.7" width="24" height="24" fill="#111111" class="point"/>
<rect x="661.0" y="352.3" width="24" height="24" fill="#111111" class="point"/>
<line x1="613.9" y1="223.4" x2="613.9" y2="265.4" class="leader"/>
<line x1="673.0" y1="364.3" x2="673.0" y2="406.3" class="leader"/>
<line x1="1444.2" y1="611.7" x2="1444.2" y2="569.7" class="leader"/>
<line x1="750.5" y1="864.1" x2="750.5" y2="822.1" class="leader"/>
<rect x="538.9" y="265.4" width="150" height="46" fill="#ffffff" class="label-box"/>
<text x="553.9" y="296.4" text-anchor="start" class="label">High E/D</text>
<rect x="568.0" y="406.3" width="210" height="46" fill="#ffffff" class="label-box"/>
<text x="583.0" y="437.3" text-anchor="start" class="label">Cooling+door</text>
<rect x="1316.7" y="523.7" width="255" height="46" fill="#ffffff" class="label-box"/>
<text x="1331.7" y="554.7" text-anchor="start" class="label">Finance+evasion</text>
<rect x="683.0" y="776.1" width="135" height="46" fill="#ffffff" class="label-box"/>
<text x="698.0" y="807.1" text-anchor="start" class="label">Low E/D</text>
</svg>
