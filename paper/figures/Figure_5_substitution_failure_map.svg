<text x="220" y="324" text-anchor="end" class="tick">0.2</text>
<line x1="260" y1="170" x2="1490" y2="170" class="grid"/>
<text x="220" y="180" text-anchor="end" class="tick">0.3</text>
<line x1="260" y1="890" x2="1490" y2="890" class="axis"/>
