<text x="80" y="530" text-anchor="middle" transform="rotate(-90 80 530)">Total distortion delta</text>
<line x1="1244" y1="170" x2="1244" y2="890" class="threshold"/>
<line x1="260" y1="602" x2="1490" y2="602" class="threshold"/>
