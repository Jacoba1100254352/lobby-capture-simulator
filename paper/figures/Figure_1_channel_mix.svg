<svg xmlns="http://www.w3.org/2000/svg" width="1800px" height="1100px" viewBox="0 0 1800 1100" role="img">
<title>Channel allocation mix</title>
<desc>Stacked horizontal bars showing modeled budget allocation shares across influence channels.</desc>
<style>
text { font-family: Helvetica, Arial, sans-serif; font-size: 34px; fill: #111; }
.title { font-size: 46px; font-weight: 700; }
.subtitle { font-size: 30px; fill: #444; }
.small, .tick, .label { font-size: 28px; }
.axis { stroke: #111; stroke-width: 5; fill: none; }
.grid { stroke: #d8d8d8; stroke-width: 3; fill: none; }
.segment, .point, .legend-swatch { stroke: #111; stroke-width: 2; }
.series-primary { stroke: #111; stroke-width: 8; fill: none; }
.series-secondary { stroke: #777; stroke-width: 8; fill: none; stroke-dasharray: 24 18; }
</style>
<rect width="100%" height="100%" fill="#fff"/>
<text x="70" y="72" text-anchor="start" class="title">Channel allocation mix</text>
<text x="70" y="122" text-anchor="start" class="subtitle">Share of lobby spending by channel</text>
<line x1="440" y1="288" x2="440" y2="902" class="grid"/>
<text x="440" y="950" text-anchor="middle" class="tick">0</text>
<line x1="700" y1="288" x2="700" y2="902" class="grid"/>
<text x="700" y="950" text-anchor="middle" class="tick">0.25</text>
<line x1="960" y1="288" x2="960" y2="902" class="grid"/>
<text x="960" y="950" text-anchor="middle" class="tick">0.5</text>
<line x1="1220" y1="288" x2="1220" y2="902" class="grid"/>
<text x="1220" y="950" text-anchor="middle" class="tick">0.75</text>
<line x1="1480" y1="288" x2="1480" y2="902" class="grid"/>
<text x="1480" y="950" text-anchor="middle" class="tick">1</text>
<text x="70" y="339" text-anchor="start">Open access</text>
<rect x="440" y="310" width="130.6" height="38" fill="#d0d0d0" class="segment"/>
<rect x="570.6" y="310" width="136.7" height="38" fill="#ababab" class="segment"/>
<rect x="707.3" y="310" width="166.5" height="38" fill="#808080" class="segment"/>
