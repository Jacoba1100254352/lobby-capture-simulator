<svg xmlns="http://www.w3.org/2000/svg" width="1800px" height="1100px" viewBox="0 0 1800 1100" role="img">
<title>Scenario tradeoff view</title>
<desc>Scatter plot comparing observed capture rates against hidden influence shares across selected scenarios.</desc>
<style>
text { font-family: Helvetica, Arial, sans-serif; font-size: 34px; fill: #111; }
.title { font-size: 46px; font-weight: 700; }
.subtitle { font-size: 30px; fill: #444; }
.small, .tick, .label { font-size: 28px; }
.axis { stroke: #111; stroke-width: 5; fill: none; }
.grid { stroke: #d8d8d8; stroke-width: 3; fill: none; }
.segment, .point, .legend-swatch { stroke: #111; stroke-width: 2; }
.series-primary { stroke: #111; stroke-width: 8; fill: none; }
.series-secondary { stroke: #777; stroke-width: 8; fill: none; stroke-dasharray: 24 18; }
</style>
<rect width="100%" height="100%" fill="#fff"/>
<text x="70" y="72" text-anchor="start" class="title">Scenario tradeoff view</text>
<text x="70" y="122" text-anchor="start" class="subtitle">Observed capture versus hidden influence</text>
<line x1="260" y1="170" x2="260" y2="890" class="grid"/>
<text x="260" y="938" text-anchor="middle" class="tick">0</text>
<line x1="670" y1="170" x2="670" y2="890" class="grid"/>
<text x="670" y="938" text-anchor="middle" class="tick">0.25</text>
<line x1="1080" y1="170" x2="1080" y2="890" class="grid"/>
<text x="1080" y="938" text-anchor="middle" class="tick">0.5</text>
<line x1="1490" y1="170" x2="1490" y2="890" class="grid"/>
<text x="1490" y="938" text-anchor="middle" class="tick">0.75</text>
<line x1="260" y1="890" x2="1490" y2="890" class="grid"/>
<text x="220" y="900" text-anchor="end" class="tick">0.0</text>
<line x1="260" y1="710" x2="1490" y2="710" class="grid"/>
<text x="220" y="720" text-anchor="end" class="tick">0.1</text>
<line x1="260" y1="530" x2="1490" y2="530" class="grid"/>
<text x="220" y="540" text-anchor="end" class="tick">0.2</text>
<line x1="260" y1="350" x2="1490" y2="350" class="grid"/>
<text x="220" y="360" text-anchor="end" class="tick">0.3</text>
<line x1="260" y1="170" x2="1490" y2="170" class="grid"/>
<text x="220" y="180" text-anchor="end" class="tick">0.4</text>
<line x1="260" y1="890" x2="1490" y2="890" class="axis"/>
<line x1="260" y1="170" x2="260" y2="890" class="axis"/>
<text x="875" y="994" text-anchor="middle">Capture rate</text>
<text x="80" y="530" text-anchor="middle" transform="rotate(-90 80 530)">Hidden influence share</text>
<rect x="1095.2" y="792.9" width="24" height="24" fill="#111111" class="point"/>
<text x="1177.2" y="856.9" text-anchor="start" class="label">Open</text>
<rect x="1331.9" y="710.1" width="24" height="24" fill="#111111" class="point"/>
<text x="1413.9" y="768.1" text-anchor="start" class="label">Rule</text>
<rect x="415.1" y="683.6" width="24" height="24" fill="#111111" class="point"/>
<text x="497.1" y="651.6" text-anchor="start" class="label">Camp</text>
<rect x="1032.1" y="374.5" width="24" height="24" fill="#111111" class="point"/>
<text x="1114.1" y="391.5" text-anchor="start" class="label">Dark</text>
<rect x="1205.4" y="707.2" width="24" height="24" fill="#111111" class="point"/>
<text x="1287.4" y="765.2" text-anchor="start" class="label">Door</text>
<rect x="291.6" y="651.4" width="24" height="24" fill="#111111" class="point"/>
<text x="373.6" y="619.4" text-anchor="start" class="label">RTD</text>
<rect x="248" y="762.3" width="24" height="24" fill="#111111" class="point"/>
<text x="330" y="848.3" text-anchor="start" class="label">Vouch</text>
<rect x="244" y="675.5" width="32" height="32" fill="#555555" class="point"/>
<text x="330" y="709.5" text-anchor="start" class="label">Bundle</text>
<rect x="244" y="279.1" width="32" height="32" fill="#555555" class="point"/>
<text x="330" y="251.1" text-anchor="start" class="label">Evasion</text>
</svg>
