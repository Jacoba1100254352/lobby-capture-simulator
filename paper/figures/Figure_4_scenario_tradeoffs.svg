<rect x="322.4" y="651.4" width="24" height="24" fill="#111111" class="point"/>
<rect x="279.9" y="762.3" width="24" height="24" fill="#111111" class="point"/>
<rect x="275.9" y="675.5" width="32" height="32" fill="#555555" class="point"/>
<rect x="275.9" y="279.1" width="32" height="32" fill="#555555" class="point"/>
<line x1="291.9" y1="295.1" x2="333.9" y2="295.1" class="leader"/>
<line x1="1057.3" y1="386" x2="1057.3" y2="344" class="leader"/>
<line x1="334.4" y1="663.4" x2="334.4" y2="621.4" class="leader"/>
<line x1="291.9" y1="691.5" x2="291.9" y2="707.5" class="leader"/>
<line x1="454.7" y1="695.6" x2="454.7" y2="653.6" class="leader"/>
<line x1="1223.9" y1="719.2" x2="1223.9" y2="677.2" class="leader"/>
<line x1="1343.7" y1="722.1" x2="1343.7" y2="680.1" class="leader"/>
<line x1="291.9" y1="774.3" x2="291.9" y2="816.3" class="leader"/>
<line x1="1116.0" y1="804.9" x2="1116.0" y2="762.9" class="leader"/>
<rect x="333.9" y="272.1" width="135" height="46" fill="#ffffff" class="label-box"/>
<text x="348.9" y="303.1" text-anchor="start" class="label">Evasion</text>
<rect x="1012.3" y="298" width="90" height="46" fill="#ffffff" class="label-box"/>
<text x="1027.3" y="329" text-anchor="start" class="label">Dark</text>
<rect x="293.4" y="575.4" width="82" height="46" fill="#ffffff" class="label-box"/>
<text x="308.4" y="606.4" text-anchor="start" class="label">RTD</text>
<rect x="255" y="707.5" width="120" height="46" fill="#ffffff" class="label-box"/>
<text x="270" y="738.5" text-anchor="start" class="label">Bundle</text>
<rect x="409.7" y="607.6" width="90" height="46" fill="#ffffff" class="label-box"/>
<text x="424.7" y="638.6" text-anchor="start" class="label">Camp</text>
<rect x="1178.9" y="631.2" width="90" height="46" fill="#ffffff" class="label-box"/>
<text x="1193.9" y="662.2" text-anchor="start" class="label">Door</text>
<rect x="1298.7" y="634.1" width="90" height="46" fill="#ffffff" class="label-box"/>
<text x="1313.7" y="665.1" text-anchor="start" class="label">Rule</text>
<rect x="255" y="816.3" width="105" height="46" fill="#ffffff" class="label-box"/>
<text x="270" y="847.3" text-anchor="start" class="label">Vouch</text>
<rect x="1071.0" y="716.9" width="90" height="46" fill="#ffffff" class="label-box"/>
<text x="1086.0" y="747.9" text-anchor="start" class="label">Open</text>
</svg>
