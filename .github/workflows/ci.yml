name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - name: Check scripts
        run: make script-checks
      - name: Run tests
        run: make test
      - name: Install paper build dependencies
        run: |
          sudo find /etc/apt/sources.list.d -type f \( -iname '*azure-cli*' -o -iname '*microsoft*' \) -print -delete
          sudo apt-get update
          sudo apt-get install -y texlive-latex-recommended texlive-latex-extra texlive-fonts-recommended texlive-fonts-extra texlive-bibtex-extra texlive-pictures texlive-science inkscape poppler-utils zip unzip
      - name: Build and verify paper PDFs and submission package
        run: make paper-artifacts-check
        env:
          LOBBY_CAPTURE_REQUIRE_RELEASE_TAG: ${{ github.ref_type == 'tag' && startsWith(github.ref_name, 'paper-publication-readiness-') && '1' || '0' }}
      - name: Ensure deterministic generated artifacts are committed
        run: |
          git diff --exit-code -- \
            ':!paper/*.pdf' \
            ':!paper/figures/*.pdf' \
            ':!reports/paper-layout-audit.md' \
            ':!reports/manual-visual-audit.md'
