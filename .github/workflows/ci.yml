name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Python scripts
        run: python3 -m py_compile scripts/*.py
      - name: Run tests
        run: make test
      - name: Install paper build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-recommended texlive-latex-extra texlive-fonts-recommended texlive-fonts-extra texlive-bibtex-extra texlive-pictures inkscape poppler-utils zip unzip
      - name: Build and verify paper PDFs and submission package
        run: make paper-artifacts-check
      - name: Ensure generated artifacts are committed
        run: git diff --exit-code
